name: Update Data And Publish Site
on:
  push:
    branches:
      - "main"
  # GitHub Actions use UTC time, so 21:00 means 5:00 UTC +8 Timezone
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup jq
        uses: dcarbone/install-jq-action@v2.0.2
      - name: Get Latest Node.js LTS version
        run: echo "NODE_VERSION=$(curl -fsSL https://nodejs.org/download/release/index.json | jq -cr 'last( sort_by( .date | split("-") | map(tonumber) ) | .[] | select(.lts) ) | .version')" >> $GITHUB_ENV
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - name: Setup npm
        run: |
          npm config set --global audit=false
          npm config set --global fund=false
          npm config set --global loglevel=error
          npm config set --global update-notifier=false
          npm config set --global engine-strict=true
          npm config set --global save=true
          curl -fsSL https://www.npmjs.com/install.sh | sh
          echo "NPM_VERSION=$(npm -v)" >> $GITHUB_ENV
      - name: Intall Dependencies
        run: npm ci
      - name: Update Bangumi data
        run: npm run crawl
      - name: Push Bangumi data to main branch
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add public/*
          git commit -m "actions: update data"
          git push
      - name: Update Bangumi Images
        run: npm run getimgs
      - name: Build site
        run: npm run build
      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: f335dee5609bac21c6bdf7b9a0a68b9d
          projectName: ma7
          directory: out
