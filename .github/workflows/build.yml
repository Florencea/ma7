name: Cloudflare Pages
on:
  push:
    branches:
      - "main"
  # GitHub Actions use UTC time, so 21:00 means 5:00 UTC +8 Timezone
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:
env:
  NODE_VERSION: lts/*
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup jq
        uses: dcarbone/install-jq-action@v2.1.0
      - name: Get Latest Node.js LTS version
        run: echo "NODE_VERSION=$(curl -fsSL https://nodejs.org/download/release/index.json | jq -cr 'last( sort_by( .version | split("v") | .[1] | split(".") | map(tonumber) ) | .[] | select( .lts ) | .version )')" >> $GITHUB_ENV
      - name: Set up node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Update npm
        run: npm install --audit false --fund false --loglevel error --progress false --global true npm
      - name: Install dependencies
        run: npm ci
      - name: Restore cache
        uses: actions/cache@v3
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-cache
      - name: Fetch data
        run: npm run crawl
      - name: Build site
        run: npm run build
      - name: Deploy to Cloudflare Pages
        run: |
          export CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}
          export CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          npx wrangler pages deploy out --project-name=ma7 --branch=main
